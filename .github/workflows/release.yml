name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # 仅在推送类似 v1.0.0 的 tag 时触发流水线

jobs:
  build-windows:
    runs-on: windows-latest
    
    # 赋予 GitHub Actions 创建 Release 和上传文件的权限
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install UPX for compression
        run: choco install upx --no-progress

      - name: Install Dependencies
        # 使用 uv 严格按照你的 pyproject.toml 同步安装所需依赖
        run: uv sync --all-extras --dev 

      - name: Build EInk-Image-Toolkit EXE
        run: |
          # 自动调用 UPX 进行高强度压缩，大幅减小最终生成的 .exe 体积
          # --noconsole 隐藏黑框，--onefile 打包为独立单文件
          uv run pyinstaller --noconsole --onefile --name "EInk-Image-Toolkit" main.py
        
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EInk-Image-Toolkit.exe
          generate_release_notes: true